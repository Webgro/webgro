name: The Gro . weekly auto-publish

on:
  schedule:
    # Mondays at 09:00 UK time. GitHub cron is UTC, so this fires at
    # 08:00 UTC year-round (will look like 09:00 GMT in winter and
    # 10:00 BST in summer; close enough). Edit if you'd rather lock
    # to civil 09:00 across DST changes.
    - cron: "0 8 * * 1"
  # Manual run-now button in the Actions tab. Useful for testing.
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required so the workflow can git push the new article.
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install Pillow

      - name: Set up Node (for tsc check)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm ci

      - name: Run auto-publish
        id: publish
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          set -e
          # auto-publish.py prints a JSON summary on its last line.
          # Capture into outputs so later steps can use them.
          python3 scripts/auto-publish.py | tee /tmp/publish-summary.json
          tail -n1 /tmp/publish-summary.json > /tmp/last.json
          echo "slug=$(python3 -c 'import json,sys;print(json.load(open("/tmp/last.json"))["slug"])')"     >> $GITHUB_OUTPUT
          echo "title=$(python3 -c 'import json,sys;print(json.load(open("/tmp/last.json"))["title"])')"   >> $GITHUB_OUTPUT
          echo "excerpt=$(python3 -c 'import json,sys;print(json.load(open("/tmp/last.json"))["excerpt"])')" >> $GITHUB_OUTPUT
          echo "category=$(python3 -c 'import json,sys;print(json.load(open("/tmp/last.json"))["category"])')" >> $GITHUB_OUTPUT

      - name: Type check
        run: npx tsc --noEmit

      - name: Commit + push the new article
        run: |
          git config user.name  "Gro Auto-publish"
          git config user.email "auto-publish@webgro.co.uk"
          git add src/content/the-gro.ts public/articles/${{ steps.publish.outputs.slug }}.jpg public/articles/feed/${{ steps.publish.outputs.slug }}.jpg
          git commit -m "The Gro: ${{ steps.publish.outputs.title }}"
          git push

      - name: Wait for Vercel deploy (60s buffer)
        run: sleep 60

      - name: Email Michael
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 scripts/notify-published.py \
            --slug      "${{ steps.publish.outputs.slug }}" \
            --title     "${{ steps.publish.outputs.title }}" \
            --excerpt   "${{ steps.publish.outputs.excerpt }}" \
            --category  "${{ steps.publish.outputs.category }}"

      - name: On failure, email Michael with the bad news
        if: failure()
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          payload = {
            "from": "Webgro Auto-publish <receptionist@webgro.co.uk>",
            "to": ["michael@webgro.co.uk"],
            "subject": "[ The Gro ] Auto-publish FAILED",
            "html": (
              "<p style='font-family:system-ui,sans-serif;font-size:15px;color:#0D1117;'>"
              "This week's Gro auto-publish job didn't complete. "
              f"See the run logs:</p>"
              f"<p><a href='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'>"
              "Open run on GitHub Actions &rarr;</a></p>"
              "<p style='font-size:12px;color:#6B7A99;'>Nothing was committed. Re-run manually from the Actions tab once the cause is fixed.</p>"
            ),
            "text": "The Gro auto-publish job failed. See: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          req = urllib.request.Request(
            "https://api.resend.com/emails",
            data=json.dumps(payload).encode("utf-8"),
            headers={
              "Authorization": f"Bearer {os.environ['RESEND_API_KEY']}",
              "Content-Type": "application/json",
            },
            method="POST",
          )
          urllib.request.urlopen(req, timeout=15).read()
          PY
